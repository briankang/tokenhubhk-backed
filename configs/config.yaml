server:
  port: 8080
  mode: debug  # debug / release / test
  env: development  # development / production
  base_url: "http://localhost:8090"  # 后端服务对外地址
  platform_domain: "tokenhubhk.com"  # main platform domain; custom agent domains resolve tenants

database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: root
  dbname: tokenhub
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600  # seconds

redis:
  addr: 127.0.0.1:6379
  username: ""   # 可选：阿里云 Tair ACL 账号名；本地开发留空走 AUTH password 模式
  password: ""
  db: 0

jwt:
  secret: "Kx9mP2$vL5nQ8wR3jF6hT0yB4cA7dG1eU2iO5pS8aW1xZ3bN6vC9kM4qJ7fH0gD"
  expire: 720  # hours (30 days)

log:
  level: info  # debug / info / warn / error
  dir: ./logs
  max_size: 100    # MB
  max_age: 30      # days
  max_backups: 5

ratelimit:
  enabled: true
  max_requests: 100
  window_seconds: 60

i18n:
  default_lang: en
  locales_dir: ./internal/pkg/i18n/locales

support:
  enabled: true
  internal_base_url: "http://localhost:8080"  # 单体模式走 localhost；三服务模式在 docker-compose 中以 SUPPORT_INTERNAL_BASE_URL=http://gateway:8080 覆盖
  internal_api_key: ""                        # 系统级 API Key。留空时 AI 客服对外返回 503；管理员可在 Dashboard 创建普通 APIKey 并贴进 system_configs.support.internal_api_key（或此处）
  embedding_model: "text-embedding-v3"
  budget_monthly_credits: 5000000             # 月预算：500 万积分 = ¥500
  budget_economy_pct: 30                      # 剩余 <30% 降级 economy 模型
  budget_emergency_pct: 5                     # 剩余 <5% 熔断为固定话术 + 强制转工单
  rag_top_k: 5
  rag_score_threshold: 0.5
  rag_multi_source: true
  max_history_turns: 8
  max_msg_len: 2000
  memory_top_k: 10
  ticket_sla_hours: 24
  provider_docs_top_k: 3
  rate_limit_per_hour: 60
  ticket_rate_limit_per_day: 20

payment:
  wechat:
    app_id: ""
    mch_id: ""
    api_key: ""
    cert_serial_no: ""
    private_key_path: ""
    notify_url: "https://api.tokenhub.com/api/v1/callback/wechat"
  alipay:
    app_id: ""
    private_key: ""
    alipay_public_key: ""
    notify_url: "https://api.tokenhub.com/api/v1/callback/alipay"
  stripe:
    secret_key: ""
    webhook_secret: ""
  paypal:
    client_id: ""
    client_secret: ""
    sandbox: true
